version: "3.8"

services:
  db:
    image: mysql:8
    container_name: proyecto-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: ventasdb
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    restart: always

  backventas:
    image: MirLuc/tutorial-ssm-backend:latest
    container_name: back-ventas
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: ventasdb
      DB_USERNAME: root
      DB_PASSWORD: admin123
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: always

  backdespachos:
    image: MirLuc/tutorial-ssm-backend-despachos:latest
    container_name: back-despachos
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: ventasdb
      DB_USERNAME: root
      DB_PASSWORD: admin123
    ports:
      - "8082:8080"
    depends_on:
      - db
    restart: always

  frontend:
    image: MirLuc/tutorial-ssm-frontend:latest
    container_name: front-despacho
    ports:
      - "80:80"
    depends_on:
      - backventas
      - backdespachos
    restart: always

volumes:
  dbdata: