name: ci_cd_frontend_ssm

on:
  push:
    branches: ["deploy"]
  workflow_run:
    workflows: ["Build & Push Frontend (Docker Hub)"]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  FRONTEND_INSTANCE_ID: i-0a4dc8e99e0264bbc # REEMPLAZA CON EL ID DE TU INSTANCIA EC2
  FRONTEND_APP_DIR: /home/ec2-user/tutorial-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Comprobar el código/repositorio
        uses: actions/checkout@v4

      - name: Configurar AWS credentials (manual con session token)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF
          cat > ~/.aws/config << EOF
          [default]
          region=${AWS_REGION}
          output=json
          EOF

      - name: Deploy frontend por SSM (docker compose)
        run: |
          aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${FRONTEND_INSTANCE_ID}" \
            --parameters commands="[
              \"cd ${FRONTEND_APP_DIR}\",
              \"docker compose pull\",
              \"docker compose up -d\"
            ]"