name: Build & Push Backend (Despachos)

on:
  push:
    branches: ["deploy"]

jobs:
  build-and-push-despachos:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto con Maven
        run: |
          # Entramos a la carpeta principal y luego a la subcarpeta del proyecto
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          mvn clean package -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Publicar Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tutorial-ssm-backend-despachos:latest