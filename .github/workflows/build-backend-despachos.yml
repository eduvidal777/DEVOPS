name: Build & Push Backend Despachos (Docker Hub)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  DESPACHOS_IMAGE: tutorial-ssm-backend-despachos
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Generate image tags
        id: tags
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push (Despachos)
        run: |
          IMAGE="${DOCKERHUB_NAMESPACE}/${DESPACHOS_IMAGE}"
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build \
            -f Dockerfile \
            -t "${IMAGE}:${{ steps.tags.outputs.VERSION }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ steps.tags.outputs.VERSION }}"
          docker push "${IMAGE}:latest"