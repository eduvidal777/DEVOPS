name: Build & Push Backend (Ventas)

on:
  push:
    branches: ["deploy"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto con Maven
        run: |
          POM_PATH=$(find back-Ventas_SpringBoot -name "pom.xml" | head -n 1)

          if [ -z "$POM_PATH" ]; then
            echo "No se encontró pom.xml"
            exit 1
          fi

          echo "POM encontrado en: $POM_PATH"

          mvn clean package -f "$POM_PATH" -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Publicar Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot
          file: ./back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tutorial-ssm-backend:latest