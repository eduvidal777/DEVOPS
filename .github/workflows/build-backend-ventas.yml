name: Build & Push Backend (Ventas)

# EXIGENCIA RÚBRICA: Disparador en la rama de despliegue
on:
  push:
    branches: ["deploy"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      # EXIGENCIA RÚBRICA: Buenas prácticas / Entorno controlado de dependencias
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto con Maven (Ignorar Tests para agilizar)
        run: |
          cd Springboot-API-REST-VENTA
          mvn clean package -DskipTests

      # EXIGENCIA RÚBRICA: Gestión adecuada de Secrets y Registry (Docker Hub)
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Publicar Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST-VENTA
          file: ./Springboot-API-REST-VENTA/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tutorial-ssm-backend:latest