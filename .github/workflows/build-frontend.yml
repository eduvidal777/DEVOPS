name: Build & Push Frontend (Docker Hub)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: criishh # Cambia por tu usuario de Docker Hub
  FRONT_IMAGE: tutorial-ssm-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar el código/repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
          | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Generar tags de la imagen
        id: tags
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Construir y publicar imagen Frontend
        run: |
          IMAGE="${DOCKERHUB_NAMESPACE}/${FRONT_IMAGE}"
          docker build \
            -f frontend/Dockerfile \
            -t "${IMAGE}:${{ steps.tags.outputs.VERSION }}" \
            frontend
          docker push "${IMAGE}:${{ steps.tags.outputs.VERSION }}"
