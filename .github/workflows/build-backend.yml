name: Build & Push Backend (Docker Hub)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  BACK_IMAGE: tutorial-ssm-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar el código/repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Generar tags de la imagen
        id: tags
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Construir y publicar imagen Backend
        run: |
          IMAGE="${DOCKERHUB_NAMESPACE}/${BACK_IMAGE}"
          cd back-Ventas_SpringBoot/Springboot-API-REST
          docker build \
            -f Dockerfile \
            -t "${IMAGE}:${{ steps.tags.outputs.VERSION }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ steps.tags.outputs.VERSION }}"
          docker push "${IMAGE}:latest"