name: Deploy Backend (AWS SSM)

# EXIGENCIA RÚBRICA: Se activa automáticamente tras finalizar los procesos en la rama deploy
on:
  workflow_run:
    workflows: ["Build & Push Backend (Ventas)", "Build & Push Backend (Despachos)."]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  BACKEND_INSTANCE_ID: i-0efe3d2b107d42ade # Tu ID de instancia EC2 de Backend

jobs:
  deploy:
    runs-on: ubuntu-latests
    # IMPORTANTE: Solo se ejecuta si los dos builds anteriores terminaron EN VERDE (success)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Comprobar el código/repositorio
        uses: actions/checkout@v4

      # EXIGENCIA DE RÚBRICA: Gestión de Secrets de AWS
      - name: Configurar AWS credentials (manual con session token)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF
          cat > ~/.aws/config << EOF
          [default]
          region=${AWS_REGION}
          output=json
          EOF

      - name: Validar instancia EC2 y SSM antes de desplegar
        run: |
          set -euo pipefail

          echo "===== DEBUG VARIABLES ====="
          echo "REGION: ${AWS_REGION}"
          echo "INSTANCE: ${BACKEND_INSTANCE_ID}"

          echo "===== VALIDANDO EC2 ====="

          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --output table

          STATE=$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          echo "Estado detectado: ${STATE}"

          if [ "${STATE}" != "running" ]; then
            echo "ERROR: Instance must be running"
            exit 1
          fi

          echo "===== VALIDANDO SSM ====="

          aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --filters "Key=InstanceIds,Values=${BACKEND_INSTANCE_ID}" \
            --output table

          PING=$(aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --filters "Key=InstanceIds,Values=${BACKEND_INSTANCE_ID}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text || true)

          echo "SSM Ping Status: ${PING}"

          if [ "${PING}" != "Online" ]; then
            echo "ERROR: Instance is not online in SSM"
            exit 1
          fi

      # EXIGENCIA DE RÚBRICA: Despliegue automatizado e inteligente en EC2 sin conflicto de comillas
      - name: Generar Script de Despliegue Nativo mediante SSM
        run: |
          aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --parameters commands='[
              "mkdir -p /home/ec2-user/app",
              "cd /home/ec2-user/app",
              "cat << \"EOF\" > deploy_engine.sh",
              "#!/bin/bash",
              "set -e",
              "echo \"=== 1. CREANDO RED PRIVADA INTERNA ===\"",
              "sudo docker network create ventas-net || true",
              "",
              "echo \"=== 2. LIMPIANDO CONTENEDORES PREVIOS ===\"",
              "sudo docker rm -f back-ventas back-despachos || true",
              "",
              "echo \"=== 3. EVALUANDO PERSISTENCIA DE BASE DE DATOS (REQUISITO RÚBRICA) ===\"",
              "if sudo docker ps -a --format \"{{.Names}}\" | grep -q \"^proyecto-db$\"; then",
              "    echo \"La base de datos ya existe en AWS. Asegurando encendido...\"",
              "    sudo docker start proyecto-db || true",
              "else",
              "    echo \"Primera ejecución: Levantando MySQL con Volumen de Persistencia (dbdata)...\"",
              "    sudo docker run -d --name proyecto-db --network ventas-net -p 3306:3306 -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=ventasdb -v dbdata:/var/lib/mysql mysql:8",
              "    sleep 25",
              "fi",
              "",
              "echo \"=== 4. DESPLEGANDO IMÁGENES DESDE DOCKER HUB ===\"",
              "sudo docker run -d --name back-ventas --network ventas-net -p 8081:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 mirluc/tutorial-ssm-backend:latest",
              "sudo docker run -d --name back-despachos --network ventas-net -p 8082:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 mirluc/tutorial-ssm-backend-despachos:latest",
              "",
              "echo \"=== 5. VERIFICACIÓN DE CONTENEDORES ===\"",
              "sudo docker ps -a",
              "EOF",
              "chmod +x deploy_engine.sh",
              "./deploy_engine.sh",
              "rm -f deploy_engine.sh"
            ]'