name: Deploy Backend (AWS SSM)

on:
  workflow_run:
    workflows: ["Build & Push Backend (Ventas)", "Build & Push Backend (Despachos)"]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  BACKEND_INSTANCE_ID: i-0efe3d2b107d42ade

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Comprobar código
        uses: actions/checkout@v4

      - name: Configurar AWS Credentials
        run: |
          mkdir -p ~/.aws

          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF

          cat > ~/.aws/config << EOF
          [default]
          region=${AWS_REGION}
          output=json
          EOF

      - name: Debug Variables
        run: |
          echo "AWS_REGION=${AWS_REGION}"
          echo "BACKEND_INSTANCE_ID=${BACKEND_INSTANCE_ID}"

      - name: Validar instancia EC2 y SSM
        run: |
          set -euo pipefail

          echo "===== VALIDANDO EC2 ====="

          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --output table

          STATE=$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)

          echo "Estado detectado: ${STATE}"

          if [ "${STATE}" != "running" ]; then
            echo "ERROR: Instance must be running"
            exit 1
          fi

          echo "===== VALIDANDO SSM ====="

          aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --filters "Key=InstanceIds,Values=${BACKEND_INSTANCE_ID}" \
            --output table

          PING=$(aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --filters "Key=InstanceIds,Values=${BACKEND_INSTANCE_ID}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text || true)

          echo "SSM Ping Status: ${PING}"

          if [ "${PING}" != "Online" ]; then
            echo "ERROR: Instance is not online in SSM"
            exit 1
          fi

      - name: Deploy Backend usando AWS SSM
        run: |
          aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --parameters commands='[
              "mkdir -p /home/ec2-user/app",
              "cd /home/ec2-user/app",

              "sudo docker network create ventas-net || true",

              "sudo docker rm -f back-ventas back-despachos proyecto-db || true",

              "sudo docker run -d --name proyecto-db --network ventas-net -p 3306:3306 -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=ventasdb -v dbdata:/var/lib/mysql mysql:8",

              "sleep 25",

              "sudo docker pull MirLuc/tutorial-ssm-backend:latest",
              "sudo docker pull MirLuc/tutorial-ssm-backend-despachos:latest",

              "sudo docker run -d --name back-ventas --network ventas-net -p 8081:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 MirLuc/tutorial-ssm-backend:latest",

              "sudo docker run -d --name back-despachos --network ventas-net -p 8082:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 MirLuc/tutorial-ssm-backend-despachos:latest",

              "sudo docker ps -a"
            ]'