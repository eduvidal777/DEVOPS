name: Deploy Backend (AWS SSM)

on:
  push:
    branches: ["deploy"]
  workflow_run:
    workflows: ["Build & Push Backend (Docker Hub)"]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  BACKEND_INSTANCE_ID: i-00bcace9e71e29335 # Tu ID de instancia EC2 de Backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Comprobar el código/repositorio
        uses: actions/checkout@v4

      - name: Configurar AWS credentials (manual con session token)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF
          cat > ~/.aws/config << EOF
          [default]
          region=${AWS_REGION}
          output=json
          EOF

      - name: Validar instancia EC2 y SSM antes de desplegar
        run: |
          set -euo pipefail
          echo "Checking EC2 instance state..."
          STATE="$(aws ec2 describe-instances --region "${AWS_REGION}" --instance-ids "${BACKEND_INSTANCE_ID}" --query 'Reservations[0].Instances[0].State.Name' --output text)"
          echo "Instance state: ${STATE}"
          if [ "${STATE}" != "running" ]; then
            echo "Instance must be 'running' to deploy via SSM. Current: ${STATE}"
            exit 1
          fi

          echo "Checking SSM managed/online status..."
          PING="$(aws ssm describe-instance-information --region "${AWS_REGION}" --filters "Key=InstanceIds,Values=${BACKEND_INSTANCE_ID}" --query 'InstanceInformationList[0].PingStatus' --output text || true)"
          echo "SSM PingStatus: ${PING}"
          if [ "${PING}" != "Online" ]; then
            echo "Instance is not Online in SSM. Verify SSM Agent + IAM instance profile + network access."
            exit 1
          fi

      - name: Deploy backend por SSM (Todo en uno automatizado)
        run: |
          aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --parameters commands="[
              \"sudo docker network create ventas-net || true\",
              \"sudo docker rm -f proyecto-db back-ventas back-despachos || true\",
              \"sudo docker run -d --name proyecto-db --network ventas-net -p 3306:3306 -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=ventasdb -v dbdata:/var/lib/mysql mysql:8\",
              \"sleep 15\",
              \"sudo docker run -d --name back-ventas --network ventas-net -p 8081:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 MirLuc/tutorial-ssm-backend:latest\",
              \"sudo docker run -d --name back-despachos --network ventas-net -p 8082:8080 -e DB_ENDPOINT=proyecto-db -e DB_PORT=3306 -e DB_NAME=ventasdb -e DB_USERNAME=root -e DB_PASSWORD=admin123 MirLuc/tutorial-ssm-backend-despachos:latest\"
            ]"